services:
  mongo:
    image: mongo:8.2.7
    container_name: mongo
    ports:
      - 27017:27017
    volumes:
      - ./mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
