name: E2E Tests

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  e2e:
    name: Run E2E + Publish Allure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start environment (Docker Compose)
        env:
          MEDIATR_LICENSE_KEY: ${{ secrets.MEDIATR_LICENSE_KEY }}
        run: |
          docker compose \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.e2e.yaml \
            up -d --wait --wait-timeout 300

      - name: Show containers status
        if: always()
        run: |
          docker compose \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.e2e.yaml \
            ps

      - name: Run Robot Framework with Allure listener
        run: |
          robot --listener allure_robotframework:allure-results \
                --outputdir results \
                tests/suites/
        continue-on-error: true

      - name: Get Allure history (from gh-pages)
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history
          retention-days: 30

      - name: Upload Robot Framework reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results
          retention-days: 30

      - name: Publish to GitHub Pages (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Show service logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.e2e.yaml \
            logs --tail=300

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.e2e.yaml \
            down -v
